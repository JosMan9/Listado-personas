<div class="container">
  <div class="col">
    <h3>
      {{title}}
    </h3>
  </div>
  <hr/>
  <form class="row">
    <div class="col-auto">
      <label for="nombre" class="visually-hidden">Nombre</label>
      <input type="text" name="nombre"
      id="nombre"
      placeholder="Escriba su nombre" class="form-control" [(ngModel)] = "nombreInput">
    </div>

    <div class="col-auto">
      <label for="apellido" class="visually-hidden">Apellido</label>
      <input type="text" name="apellido"
      id="apellido"
      placeholder="Escriba su apellido" class="form-control" [(ngModel)] = "apellidoInput">
    </div>
    <div class="col">
      <button type="submit" class="btn btn-primary" (click)="agregarPersona()">Agregar</button>
    </div>
  </form>
</div>

<div class="container">
  <hr>
  <div class="row">
    <div class="col">
    <div *ngFor="let persona of personas; let i = index">
     Persona número {{i+1}}:  {{persona.nombre}}  {{persona.apellido}}
    </div>
    </div>
  </div>
</div>
